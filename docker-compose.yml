version: '3.8'

services:
  fastapi_backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - R2_ENDPOINT_URL=${R2_ENDPOINT_URL}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - BUCKET_NAME=${BUCKET_NAME}
      - MEILI_URL=http://meilisearch_db:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - MEILI_INDEX_NAME=${MEILI_INDEX_NAME:-documents}
    env_file:
      - .env
    depends_on:
      - meilisearch_db

  meilisearch_db:
    image: getmeili/meilisearch:v1.8
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    environment:
      - MEILI_ENV=production
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}

volumes:
  meili_data:
